{% extends 'base.html' %}

{% block start %}

<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-6 text-center">
            <div class="card-food p-5">
                <div style="font-size: 5rem; color: #2d6a4f;">
                    <i class="fas fa-check-circle"></i>
                </div>
                <h2 class="fw-bold mt-4" style="color: var(--secondary);">Payment Successful!</h2>
                <p class="text-muted mb-4">Thank you for your order. Your food is being prepared and will be delivered soon.</p>
                <div class="d-flex justify-content-center gap-3">
                    <a href="/orders/" class="btn btn-primary-custom">
                        <i class="fas fa-receipt me-2"></i> View Orders
                    </a>
                    <a href="/all-items/" class="btn btn-outline-dark">
                        <i class="fas fa-utensils me-2"></i> Order More
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
