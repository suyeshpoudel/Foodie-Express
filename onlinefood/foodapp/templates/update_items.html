{% extends "base.html" %}

{% block start %}

<div class="page-header">
    <div class="container">
        <h1><i class="fas fa-edit me-2"></i>Update Item</h1>
        <p>Edit menu item details</p>
    </div>
</div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card-form">
                <div class="card-header text-center">
                    <i class="fas fa-edit fa-3x mb-2" style="opacity: 0.8;"></i>
                    <h3>{{ item.item_name }}</h3>
                </div>
                <div class="card-body">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="item_name" class="form-label-custom">Item Name</label>
                            <input name="item_name" value="{{ item.item_name }}" required type="text" class="form-control form-control-custom">
                        </div>
                        <div class="mb-3">
                            <label for="description" class="form-label-custom">Description</label>
                            <textarea name="description" required class="form-control form-control-custom" rows="3">{{ item.description }}</textarea>
                        </div>
                        <div class="mb-3">
                            <label for="category" class="form-label-custom">Category</label>
                            <select name="category" id="category" class="form-control form-control-custom" required>
                                <option value="">Select a category</option>
                                {% for cat in categories %}
                                <option value="{{ cat.uid }}" {% if item.category and item.category.uid == cat.uid %}selected{% endif %}>
                                    {{ cat.category_name }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="price" class="form-label-custom">Price (NPR)</label>
                                <input name="price" value="{{ item.price }}" required type="number" class="form-control form-control-custom">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="prep_time" class="form-label-custom">Prep Time (min)</label>
                                <input name="prep_time" value="{{ item.prep_time }}" type="number" class="form-control form-control-custom" min="1">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="image" class="form-label-custom">Image</label>
                                <input name="image" type="file" class="form-control form-control-custom">
                                {% if item.image %}
                                <small class="text-muted">Leave empty to keep current image</small>
                                {% endif %}
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary-custom w-100 py-2">
                            <i class="fas fa-save me-2"></i> Update Item
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
