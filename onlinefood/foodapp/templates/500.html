{% extends "base.html" %}

{% block start %}

<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-6 text-center">
            <div class="card-food p-5">
                <div style="font-size: 6rem; color: var(--accent);">
                    <i class="fas fa-exclamation-triangle"></i>
                </div>
                <h1 class="display-1 fw-bold" style="color: var(--accent);">500</h1>
                <h4 class="fw-bold">Server Error</h4>
                <p class="text-muted mb-4">Something went wrong on our end. Please try again later.</p>
                <a href="/" class="btn btn-primary-custom">
                    <i class="fas fa-home me-2"></i> Go Home
                </a>
            </div>
        </div>
    </div>
</div>

{% endblock %}
